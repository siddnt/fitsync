name: FitSync CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci --legacy-peer-deps --prefix client

      - name: Lint client
        run: npm run lint --prefix client --if-present
        continue-on-error: true

      - name: Run tests with coverage
        run: npm test -- --coverage --forceExit --detectOpenHandles
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ci-test-jwt-secret
          REFRESH_TOKEN_SECRET: ci-test-refresh-secret
          JWT_EXPIRY: 1d
          REFRESH_TOKEN_EXPIRY: 7d

      - name: Build client
        run: npm run client:build

      - name: Build Docker image
        run: docker build -t fitsync-api:ci .

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            coverage/
            test-report.html
          retention-days: 14
