services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitsync-api
    ports:
      - '4001:4000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4000
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fitsync

  redis:
    image: redis:7-alpine
    container_name: fitsync-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - fitsync

volumes:
  redis-data:

networks:
  fitsync:
    driver: bridge
