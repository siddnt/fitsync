services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"quit(db.adminCommand({ ping: 1 }).ok ? 0 : 2)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-fitsync-meili-key}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:7700/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    environment:
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-production}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_DEFAULT_TTL_SECONDS: ${REDIS_DEFAULT_TTL_SECONDS:-120}
      GYM_IMPRESSION_FLUSH_INTERVAL_MS: ${GYM_IMPRESSION_FLUSH_INTERVAL_MS:-15000}
      MEILISEARCH_HOST: ${MEILISEARCH_HOST:-http://meilisearch:7700}
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-fitsync-meili-key}
      SEARCH_BOOTSTRAP_ON_STARTUP: ${SEARCH_BOOTSTRAP_ON_STARTUP:-true}
      SEARCH_SYNC_FLUSH_INTERVAL_MS: ${SEARCH_SYNC_FLUSH_INTERVAL_MS:-1000}
      SEARCH_SYNC_MAX_QUEUE_ITEMS: ${SEARCH_SYNC_MAX_QUEUE_ITEMS:-1000}
      SEARCH_SYNC_QUEUE_NAME: ${SEARCH_SYNC_QUEUE_NAME:-fitsync-search-sync}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-25}
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-3000}
      OUTBOX_RETRY_DELAY_MS: ${OUTBOX_RETRY_DELAY_MS:-15000}
      MONGODB_MAX_POOL_SIZE: ${MONGODB_MAX_POOL_SIZE:-20}
      MONGODB_MIN_POOL_SIZE: ${MONGODB_MIN_POOL_SIZE:-5}
      MONGODB_SERVER_SELECTION_TIMEOUT_MS: ${MONGODB_SERVER_SELECTION_TIMEOUT_MS:-5000}
      MONGODB_SOCKET_TIMEOUT_MS: ${MONGODB_SOCKET_TIMEOUT_MS:-45000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080,http://localhost:4000}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev-refresh-secret}
      CLIENT_BASE_URL: ${CLIENT_BASE_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:4000}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_dummy}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_dummy}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_dummy}
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
      CLOUDINARY_UPLOAD_FOLDER: ${CLOUDINARY_UPLOAD_FOLDER:-fitsync}
    ports:
      - "4000:4000"
    volumes:
      - uploads-data:/app/src/storage/uploads
      - logs-data:/app/src/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:4000/api/system/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    profiles: ["monitoring"]
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    profiles: ["monitoring"]
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3001:3000"
    volumes:
      - ./ops/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

  jenkins:
    profiles: ["jenkins"]
    build:
      context: ./jenkins/local
      dockerfile: Dockerfile
    user: root
    restart: unless-stopped
    environment:
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false -Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true
      FITSYNC_LOCAL_SOURCE: /workspace/fitsync
    ports:
      - "8081:8080"
    volumes:
      - jenkins-home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace/fitsync:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/login > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  mongo-data:
  uploads-data:
  logs-data:
  jenkins-home:
